name: News Bot 24/7 Pulse

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes, 24/7
  workflow_dispatch:      # Manual trigger button in Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install aiohttp beautifulsoup4 python-telegram-bot google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Run Scraper
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CH_ID: ${{ secrets.CH_ID }}
          LINKVERTISE_ID: ${{ secrets.LINKVERTISE_ID }}
          GDRIVE_JSON: ${{ secrets.GDRIVE_JSON }}
        run: python app.py
