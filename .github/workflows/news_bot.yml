name: Automated News Bot

on:
  schedule:
    # Runs every 6 hours (UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install pillow aiogram instagrapi
          # Add any other dependencies from your requirements.txt

      - name: Run News Bot
        env:
          # Map your GitHub Secrets to Environment Variables
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INSTA_USERNAME: ${{ secrets.INSTA_USERNAME }}
          INSTA_PASSWORD: ${{ secrets.INSTA_PASSWORD }}
        run: python main.py # Ensure this matches your main script name
